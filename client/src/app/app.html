<div class="hud">
  <h1>Scapelike</h1>

  <div *ngIf="!loggedIn">
    <input
      #usernameInput
      placeholder="Enter username"
      (keydown.enter)="onLogin(usernameInput.value)"
    />
    <button (click)="onLogin(usernameInput.value)">Enter</button>
  </div>

  <div *ngIf="loggedIn">
    <p>
      Server:
      <strong [class.online]="game.connected">{{
        game.connected ? 'Connected' : 'Disconnected'
      }}</strong>
    </p>

    <details open>
      <summary>Session</summary>
      <pre>playerId: {{ sessionInfo?.playerId ?? '...' }}</pre>
    </details>

    <details open>
      <summary>Tick</summary>
      <pre>
seq:   {{ tickSeq }}
count: {{ tickCount }}</pre
      >
    </details>

    <ul *ngIf="messages.length > 0">
      <li *ngFor="let msg of messages">{{ msg }}</li>
    </ul>
  </div>
</div>
